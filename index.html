<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WinForge - Powerful Windows Development Toolkit">
    <title>WinForge</title>
    <link rel="stylesheet" href="lib/nprogress.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="hero">
            <h1 class="main-title">WinForge</h1>
            <p class="subtitle">Powerful Windows Development Toolkit</p>
            <a href="release/latest.exe" class="download-btn" download>
                <svg class="download-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                Download Now
            </a>
        </header>

        <section class="screenshot-section">
            <h2 class="section-title">Preview</h2>
            <div class="screenshot-container">
                <img src="images/screenshot.png" alt="WinForge Screenshot" class="screenshot" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div class="screenshot-placeholder" style="display: none;">
                    <p>Place your screenshot in images/screenshot.png</p>
                </div>
            </div>
        </section>

        <footer class="footer">
            <p>&copy; 2026 WinForge. All rights reserved.</p>
        </footer>
    </div>

    <script src="lib/nprogress.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
